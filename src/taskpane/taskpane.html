<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見積書バリデーション</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #217346;
    }
    #validate-btn {
      width: 100%;
      padding: 10px;
      background: #217346;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 16px;
    }
    #validate-btn:hover { background: #1a5c38; }
    #validate-btn:disabled { background: #999; cursor: wait; }

    #status {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }

    .result-section {
      margin-bottom: 16px;
    }
    .result-section h2 {
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 4px 4px 0 0;
      color: white;
    }
    .result-section h2.pass { background: #217346; }
    .result-section h2.fail { background: #c00; }
    .result-section h2.warn { background: #e68a00; }
    .result-body {
      padding: 8px;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 4px 4px;
      font-size: 12px;
      background: white;
    }
    .result-body ul { padding-left: 16px; }
    .result-body li { margin-bottom: 4px; }
    .cell-link {
      color: #0066cc;
      cursor: pointer;
      text-decoration: underline;
    }
    .cell-link:hover { color: #004499; }

    #results-container { margin-top: 8px; }
    .no-issues {
      text-align: center;
      padding: 20px;
      color: #217346;
      font-size: 14px;
    }

    /* Submit gate banner */
    #gate-banner {
      display: none;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      text-align: center;
      font-weight: bold;
      font-size: 15px;
    }
    #gate-banner.not-ready {
      display: block;
      background: #fde8e8;
      border: 2px solid #c00;
      color: #c00;
    }
    #gate-banner.ready {
      display: block;
      background: #e8f5e9;
      border: 2px solid #217346;
      color: #217346;
    }
    #gate-banner .count {
      font-size: 28px;
      display: block;
      line-height: 1.2;
    }
    #gate-banner .label {
      font-size: 12px;
      font-weight: normal;
    }
  </style>
</head>
<body>
  <h1>見積書 入力チェック</h1>
  <div id="gate-banner"></div>
  <button id="validate-btn">チェック実行</button>
  <div id="status"></div>
  <div id="results-container"></div>

  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</body>
</html>
